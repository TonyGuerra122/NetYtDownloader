name: Build MSI Release

on: 
  push:
    tags:
      - "v*"
permissions:
  contents: write

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish App
        run: >
          dotnet publish GUI/GUI.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -o publish

      - name: Install WiX
        run: dotnet tool install --global wix

      - name: Build MSI
        run: |
          wix build installer/Product.wxs `
            -define PublishDir="$(pwd)\publish" `
            -out NetYtDownloader.msi
        env:
          WIX_ACCEPT_LICENSE: yes

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: NetYtDownloader.msi